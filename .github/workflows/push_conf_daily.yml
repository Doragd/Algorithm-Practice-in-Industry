name: push_conf_daily

env:
  PYTHON_VERSION: "3.8" # set this to the Python version to use
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

on:      
  workflow_dispatch:
  # schedule:
  #   - cron: '0 0 * * *' # 每天 UTC 时间 00:00 触发, 即上海时间08点 - 已禁用

jobs:
  daily-push:
    runs-on: ubuntu-latest
    env:
      SERVERCHAN_API_KEY: ${{ secrets.SERVERCHAN_API_KEY }}
      CAIYUN_TOKEN: ${{ secrets.CAIYUN_TOKEN }}
      CONF_URL: ${{ secrets.CONF_URL }}
      FEISHU_URL: ${{ secrets.FEISHU_URL }}
      INTERVAL: 5
      LIMITS: 10
      ERROR_LIMITS: 5
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      MODEL_TYPE: "DeepSeek"

    permissions:
      issues: write
      contents: write

    steps:
      - name: Debug time
        run: |
          echo "UTC:"
          date -u
          echo "Local:"
          date
          echo "Beijing:"
          TZ=Asia/Shanghai date

      - uses: actions/checkout@v3
        with:
          lfs: true
      - name: Set up Python version
        uses: actions/setup-python@v3
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          
      - name: Install dependencies
        run: pip install -r requirements.txt


      - name: PUSH CONF DAILY
        run: |
          python paperBotV2/conf_summary/conf_daily.py
          cd paperBotV2/conf_summary
          python convert_to_md.py
          python update_readme_papers.py
        
      - name: Commit files
        id: commit
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "github-actions"
          git add --all
          if [ -z "$(git status --porcelain)" ]; then
             echo "push=false" >> "$GITHUB_OUTPUT"
          else
             git commit -m "chore: update confs" -a
             echo "push=true" >> "$GITHUB_OUTPUT"
          fi
        shell: bash

      - name: Push changes
        if: steps.commit.outputs.push == 'true'
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
