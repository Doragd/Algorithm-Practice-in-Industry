# 晚间恢复工作流：检查中午 arxiv_daily_full 状态，失败或缺失时补跑
name: arxiv_daily_recovery
on:
  schedule:
    # 每天UTC时间10:05（北京时间18:05）检查中午任务状态
    - cron: '5 10 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.8"
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  recover_arxiv_daily:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      issues: write
      contents: write
      pages: write
      id-token: write
    steps:
      - name: Debug time
        run: |
          echo "UTC:"
          date -u
          echo "Local:"
          date
          echo "Beijing:"
          TZ=Asia/Shanghai date

      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          lfs: true

      - name: Set up Python 3.8
        uses: actions/setup-python@v4
        with:
          python-version: '3.8'

      - name: Check whether recovery is needed
        id: recovery_check
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -m paperBotV2.arxiv_daily.check_recovery_needed

      - name: Install dependencies
        if: steps.recovery_check.outputs.needs_recovery == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run arxiv.py recovery
        if: steps.recovery_check.outputs.needs_recovery == 'true'
        env:
          FEISHU_URL: ${{ secrets.FEISHU_URL }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TARGET_CATEGORYS: "cs.IR,cs.CL,cs.CV"
          MAX_PAPERS: "100"
          ARXIV_LOOKBACK_HOURS: "36"
          ARXIV_PAGE_SIZE: "100"
          ARXIV_MAX_PAGES: "20"
          ARXIV_CATEGORY_MAX_PAGES: "cs.IR:8,cs.CL:8,cs.CV:5"
          ARXIV_REQUEST_INTERVAL: "60"
          ARXIV_CATEGORY_INTERVAL: "120"
          ARXIV_JITTER_SECONDS: "120"
          ARXIV_CATEGORY_RETRY_ATTEMPTS: "1"
          ARXIV_USE_DAILY_CACHE: "true"
          ARXIV_RETRY_ATTEMPTS: "4"
          ARXIV_RETRY_BASE_WAIT: "600"
          ARXIV_RETRY_MAX_WAIT: "2400"
          ARXIV_API_BASE_URLS: "https://export.arxiv.org/api/query,https://arxiv.org/api/query"
          ROUGH_SCORE_THRESHOLD: "4"
          RETURN_PAPERS: "20"
          PYTHONPATH: ${{ github.workspace }}
          PYTHONUNBUFFERED: "1"
        run: |
          set -euo pipefail

          max_attempts=3
          for attempt in $(seq 1 "$max_attempts"); do
            echo "🚀 arxiv.py recovery 外层尝试 ${attempt}/${max_attempts}"

            if python -m paperBotV2.arxiv_daily.arxiv; then
              echo "✅ arxiv.py recovery 执行成功"
              exit 0
            fi

            exit_code=$?
            if [ "$attempt" -eq "$max_attempts" ]; then
              echo "❌ arxiv.py recovery 已达到最大重试次数，最终失败"
              exit "$exit_code"
            fi

            if [ "$attempt" -eq 1 ]; then
              wait_seconds=1800
            else
              wait_seconds=3600
            fi

            echo "⏳ arxiv.py recovery 执行失败，等待 ${wait_seconds}s 后重试"
            sleep "$wait_seconds"
          done

      - name: Generate HTML pages
        if: steps.recovery_check.outputs.needs_recovery == 'true'
        run: |
          cd paperBotV2/arxiv_daily
          python generate_arxiv_html.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Mark HTML generated
        if: steps.recovery_check.outputs.needs_recovery == 'true'
        run: |
          python - <<'PY'
          from paperBotV2.arxiv_daily.status import update_today_output
          updated = update_today_output(html_generated=True)
          print(f"HTML generated status updated: {updated}")
          PY
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Check generated files
        if: steps.recovery_check.outputs.needs_recovery == 'true'
        run: |
          echo "检查生成的HTML文件："
          ls -la paperBotV2/arxiv_daily/output/
          echo "检查生成的JSON文件："
          ls -la paperBotV2/arxiv_daily/data/
          echo "检查状态文件："
          ls -la paperBotV2/arxiv_daily/status/

      - name: Commit files
        if: steps.recovery_check.outputs.needs_recovery == 'true'
        id: commit
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "github-actions"
          git add --all
          if [ -z "$(git status --porcelain)" ]; then
            echo "push=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: recover arxiv papers and status"
            echo "push=true" >> "$GITHUB_OUTPUT"
          fi
        shell: bash

      - name: Push changes
        if: steps.recovery_check.outputs.needs_recovery == 'true' && steps.commit.outputs.push == 'true'
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to GitHub Pages
        if: steps.recovery_check.outputs.needs_recovery == 'true'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./paperBotV2/arxiv_daily/output
          destination_dir: arxiv_daily
          publish_branch: gh-pages
          commit_message: "docs: recover arXiv papers HTML pages"
          full_commit_message: "docs: recover arXiv papers HTML pages ${{ github.sha }}"
          force_orphan: false

      - name: Send Feishu message after recovery
        if: steps.recovery_check.outputs.needs_recovery == 'true'
        env:
          FEISHU_URL: ${{ secrets.FEISHU_URL }}
          PYTHONPATH: ${{ github.workspace }}
        run: |
          cd paperBotV2/arxiv_daily
          python arxiv_feishu_msg.py

      - name: Commit status on failure
        if: failure() && steps.recovery_check.outputs.needs_recovery == 'true'
        id: failure_status_commit
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "github-actions"
          if [ -d paperBotV2/arxiv_daily/status ]; then
            git add paperBotV2/arxiv_daily/status/
          fi
          if [ -z "$(git status --porcelain -- paperBotV2/arxiv_daily/status/)" ]; then
            echo "push=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: update failed arxiv recovery status"
            echo "push=true" >> "$GITHUB_OUTPUT"
          fi
        shell: bash

      - name: Push status on failure
        if: failure() && steps.failure_status_commit.outputs.push == 'true'
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
