name: push_arxiv_daily_cl

env:
  PYTHON_VERSION: "3.8" # set this to the Python version to use
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

on:
  workflow_dispatch:
  # schedule:
  #   - cron: '0 0 * * *' # 每天 UTC 时间 00:00 触发, 即上海时间8点00 - 已禁用

jobs:
  daily-push:
    runs-on: ubuntu-latest
    env:
      TARGET_CATEGORYS: "cs.CL"
      MAX_PAPERS: "10"
      RETURN_PAPERS: "10"
      FEISHU_URL: ${{ secrets.FEISHU_URL }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      PYTHONPATH: ${{ github.workspace }}

    permissions:
      issues: write
      contents: write

    steps:
      - uses: actions/checkout@v3
        with:
          lfs: true
      - name: Set up Python version
        uses: actions/setup-python@v3
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          
      - name: Install dependencies
        run: pip install -r requirements.txt


      - name: PUSH ARXIV DAILY
        # Migrated from the legacy top-level entrypoint to paperBotV2.
        run: python -m paperBotV2.arxiv_daily.arxiv
        
      - name: Commit files
        id: commit
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "github-actions"
          git add --all
          if [ -z "$(git status --porcelain)" ]; then
             echo "push=false" >> "$GITHUB_OUTPUT"
          else
             git commit -m "chore: update confs" -a
             echo "push=true" >> "$GITHUB_OUTPUT"
          fi
        shell: bash

      - name: Push changes
        if: steps.commit.outputs.push == 'true'
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
